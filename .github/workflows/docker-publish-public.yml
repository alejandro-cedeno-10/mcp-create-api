# =============================================================================
# Build & Publish Docker Image — PUBLIC (solo tags public*)
# =============================================================================
# Se ejecuta únicamente cuando se publica un tag que coincida con `public*`
# (ej: public, public-v1, public-v2). El tag de la imagen es incremental:
# public-v1 -> ghcr.io/<owner>/mcp-raia-api:publish-v1
# public-v2 -> ghcr.io/<owner>/mcp-raia-api:publish-v2
# public -> ghcr.io/<owner>/mcp-raia-api:publish
# =============================================================================

name: Build & Publish Docker Image (public)

on:
  push:
    tags:
      - "public*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mcp-raia-api

jobs:
  build-and-push:
    name: Build & push to GHCR (public)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tag de imagen incremental: public-v1 -> publish-v1, public-v2 -> publish-v2, public -> publish
      - name: Set publish tag from git tag
        id: publish-tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == public* ]]; then
            echo "tag=publish${REF#public}" >> $GITHUB_OUTPUT
          else
            echo "tag=publish" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.publish-tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            | timeout 5 docker run -i --rm \
                -e APIARY_API_KEY="ci-smoke-key" \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.publish-tag.outputs.tag }} \
              2>/dev/null \
            | grep -q '"result"' \
            && echo "Smoke test PASSED" \
            || echo "Smoke test WARNING: no result (normal si la key es invalida)"
