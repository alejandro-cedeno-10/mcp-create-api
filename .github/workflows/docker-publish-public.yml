# =============================================================================
# Build & Publish Docker Image — PUBLIC (solo rama public + tags)
# =============================================================================
# Se ejecuta únicamente cuando:
#   - Se hace push a la rama `public`, o
#   - Se publica un tag `v*` (típicamente creado desde `public` para soltar al público)
# La imagen publicada es la misma: ghcr.io/<owner>/mcp-raia-api
# =============================================================================

name: Build & Publish Docker Image (public)

on:
  push:
    branches:
      - public
    tags:
      - "v*"
  pull_request:
    branches:
      - public

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mcp-raia-api

jobs:
  build-and-push:
    name: Build & push to GHCR (public)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: push a public -> :latest; tag v1.2.3 -> :1.2.3, :1.2, :latest; PR -> :pr-N
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/public' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            | timeout 5 docker run -i --rm \
                -e APIARY_API_KEY="ci-smoke-key" \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              2>/dev/null \
            | grep -q '"result"' \
            && echo "Smoke test PASSED" \
            || echo "Smoke test WARNING: no result (normal si la key es invalida)"
        if: github.event_name != 'pull_request'
